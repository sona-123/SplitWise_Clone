version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: expense_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: expense_db
    ports: 
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
      build: .
      container_name: splitwise_backend
      restart: always
      ports:
        - "8080:8080"
      depends_on:
        - postgres
      env_file:
        - .env
volumes:
  postgres_data: