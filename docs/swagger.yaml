definitions:
  handlers.GoogleLoginRequest:
    properties:
      id_token:
        type: string
    type: object
  models.Balance:
    properties:
      amount:
        type: number
      from_user:
        type: integer
      to_user:
        type: integer
    type: object
  models.Expense:
    properties:
      amount:
        type: number
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      group_id:
        type: integer
      id:
        type: integer
      paid_by:
        description: The user who paid
        type: integer
      receipt_image:
        type: string
      shares:
        items:
          $ref: '#/definitions/models.ExpenseShare'
        type: array
      split_type:
        type: string
      user_ids:
        description: The participants who are involved
        items:
          type: integer
        type: array
    type: object
  models.ExpenseShare:
    properties:
      amount:
        type: number
      user_id:
        type: integer
    type: object
  models.Group:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.User:
    properties:
      auth_provider:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      profile_pic:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/google-login:
    post:
      consumes:
      - application/json
      description: Verify Google ID token and return user info
      parameters:
      - description: Google ID Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Test Google token verification
      tags:
      - Auth
  /expenses:
    post:
      consumes:
      - application/json
      description: Add an expense to a group (requires authentication)
      parameters:
      - description: Expense Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.Expense'
      produces:
      - application/json
      responses:
        "201":
          description: Expense added
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid input
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new expense
      tags:
      - Expenses
  /groups:
    post:
      consumes:
      - application/json
      description: Create a group with current user as owner
      parameters:
      - description: Group Request
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Group'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to create group
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new group
      tags:
      - Groups
  /groups/{id}/balances:
    get:
      description: Get simplified balances for a group
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Balance'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get group balances
      tags:
      - Balances
  /groups/{id}/members:
    post:
      consumes:
      - application/json
      description: Add a user to a group
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: User ID
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: User added successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid input
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to add member
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Add member to group
      tags:
      - Groups
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: JWT Token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid input
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorize
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - Auth
  /users:
    post:
      consumes:
      - application/json
      description: Create a new user with name, password, email, and profile picture
      parameters:
      - description: User Request
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to create user
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - Users
  /users/summary:
    get:
      description: Get overall balance summary of the logged-in user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user summary
      tags:
      - Users
swagger: "2.0"
